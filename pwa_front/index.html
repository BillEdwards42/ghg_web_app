<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4976CB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <title>Ln{Carbon}</title>
  <meta name="description" content="Record and track greenhouse-gas data entries on the go.">

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/assets/lndata_logo_en.png">
  <link rel="icon" href="/assets/lndata_logo_en.png">

  <!-- Fonts: Plus Jakarta Sans + Noto Sans TC for clean, branded corporate look -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- Capture default add to home screen banner synchronously before React loads -->
  <script>
    window.deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      window.deferredPrompt = e;
    });
  </script>
</head>

<body>
  <!-- DOM -->
  <div id="root"></div>
  <!-- App Script (ES modules) -->
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
